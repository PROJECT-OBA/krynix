name: Planning Delegate

on:
  schedule:
    - cron: "0 9 * * 1-5"
  workflow_dispatch:
    inputs:
      max_parallel:
        description: "Maximum issues to delegate in this run"
        required: false
        default: "2"
      dry_run:
        description: "Run without dispatching agent-task workflow"
        required: false
        type: boolean
        default: true
      include_in_progress:
        description: "Also consider status:in_progress tasks"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write
  actions: write
  pull-requests: read

concurrency:
  group: planning-delegate
  cancel-in-progress: false

jobs:
  delegate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Delegate eligible agent tasks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MAX_PARALLEL=2
          DRY_RUN=false
          INCLUDE_IN_PROGRESS=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MAX_PARALLEL="${{ github.event.inputs.max_parallel }}"
            DRY_RUN="${{ github.event.inputs.dry_run }}"
            INCLUDE_IN_PROGRESS="${{ github.event.inputs.include_in_progress }}"
          fi

          ARGS=("delegate" "--max-parallel" "$MAX_PARALLEL")
          if [ "$INCLUDE_IN_PROGRESS" = "true" ]; then
            ARGS+=("--include-in-progress")
          fi
          if [ "$DRY_RUN" = "true" ]; then
            ARGS+=("--dry-run")
          else
            ARGS+=("--apply")
          fi

          node scripts/planning/orchestrator.mjs "${ARGS[@]}"
