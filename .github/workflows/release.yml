name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Standalone binary smoke test
        run: |
          node packages/cli/dist/standalone/main.cjs --version
          node packages/cli/dist/standalone/main.cjs --help

      - name: Prepare release artifacts
        run: |
          mkdir -p release
          cp packages/cli/dist/standalone/main.cjs release/krynix.cjs
          chmod +x release/krynix.cjs

          # Create tarball of all packages
          tar -czf release/krynix-${{ github.ref_name }}.tar.gz \
            packages/core/dist \
            packages/policy/dist \
            packages/replay/dist \
            packages/cli/dist \
            packages/adapter-langchain/dist \
            packages/adapter-openclaw/dist \
            packages/*/README.md \
            packages/*/package.json \
            README.md \
            LICENSE \
            NOTICE

      - name: Publish packages to npm
        run: pnpm -r publish --access public --no-git-checks --provenance
        env:
          NPM_CONFIG_PROVENANCE: "true"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/krynix.cjs
            release/krynix-${{ github.ref_name }}.tar.gz
