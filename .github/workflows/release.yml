name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Upgrade npm to a Trusted-Publishing-capable version
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Standalone binary smoke test
        run: |
          node packages/cli/dist/standalone/main.cjs --version
          node packages/cli/dist/standalone/main.cjs --help

      - name: Prepare release artifacts
        run: |
          mkdir -p release
          cp packages/cli/dist/standalone/main.cjs release/krynix.cjs
          chmod +x release/krynix.cjs

          # Create tarball of all packages
          tar -czf release/krynix-${{ github.ref_name }}.tar.gz \
            packages/core/dist \
            packages/policy/dist \
            packages/replay/dist \
            packages/cli/dist \
            packages/adapter-langchain/dist \
            packages/adapter-openclaw/dist \
            packages/*/README.md \
            packages/*/package.json \
            README.md \
            LICENSE \
            NOTICE

      - name: Publish packages to npm
        # Trusted Publishing: no NPM_TOKEN required. npm CLI fetches an OIDC
        # token from GitHub Actions and exchanges it with npm for a short-lived
        # publish credential.
        run: |
          for p in core policy replay cli adapter-langchain adapter-openclaw; do
            echo "::group::Publishing @krynix/$p"
            (cd packages/$p && npm publish --access public --provenance)
            echo "::endgroup::"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/krynix.cjs
            release/krynix-${{ github.ref_name }}.tar.gz
