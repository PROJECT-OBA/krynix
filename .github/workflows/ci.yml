name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: CLI binary smoke test
        run: |
          node packages/cli/dist/main.js --version
          node packages/cli/dist/main.js --help
          node packages/cli/dist/main.js replay --verify --golden-dir test/golden/
          node packages/cli/dist/main.js stats --trace test/golden/minimal.trace.jsonl
          node packages/cli/dist/main.js policy test --policy packages/adapter-openclaw/policies/openclaw-default.policy.yaml --trace test/golden/openclaw-minimal.trace.jsonl --expect-verdict fail
