name: Planning Sync

on:
  push:
    branches: [main]
    paths:
      - docs/20_development/phase1_backlog.md
      - docs/20_development/phase1_milestones.md
      - docs/20_development/documentation_governance.md
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply sync mutations"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: planning-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run planning sync
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APPLY=true
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.apply }}" = "false" ]; then
            APPLY=false
          fi

          if [ "$APPLY" = true ]; then
            node scripts/planning/orchestrator.mjs sync --apply
          else
            node scripts/planning/orchestrator.mjs sync --dry-run
          fi

      - name: Detect sync-generated changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR with backlog sync updates
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(planning): sync backlog issue/status links"
          title: "chore(planning): sync backlog issue/status links"
          body: |
            ## Summary
            - sync Phase 1 backlog issue links and statuses from GitHub
            - keep canonical docs aligned with current execution state

            Generated by `planning-sync.yml`.
          branch: "chore/planning-sync-${{ github.run_id }}"
          delete-branch: true
