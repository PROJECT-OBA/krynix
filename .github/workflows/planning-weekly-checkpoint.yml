name: Planning Weekly Checkpoint

on:
  schedule:
    - cron: "0 10 * * 1"
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply checkpoint write"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  issues: read
  pull-requests: write

concurrency:
  group: planning-weekly-checkpoint
  cancel-in-progress: false

jobs:
  checkpoint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate weekly checkpoint
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APPLY=true
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.apply }}" = "false" ]; then
            APPLY=false
          fi

          if [ "$APPLY" = true ]; then
            node scripts/planning/orchestrator.mjs checkpoint --apply
          else
            node scripts/planning/orchestrator.mjs checkpoint --dry-run
          fi

      - name: Detect checkpoint changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR with weekly checkpoint
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(planning): append weekly checkpoint"
          title: "chore(planning): append weekly checkpoint"
          body: |
            ## Summary
            - append automated weekly checkpoint from GitHub task status
            - keep planning cadence up to date

            Generated by `planning-weekly-checkpoint.yml`.
          branch: "chore/planning-checkpoint-${{ github.run_id }}"
          delete-branch: true
