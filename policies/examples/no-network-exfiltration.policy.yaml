apiVersion: krynix.dev/v1
kind: Policy
metadata:
  name: no-network-exfiltration
  version: "1.0.0"
  description: >
    Deny tool calls that make outbound network requests.
    Prevents agents from exfiltrating data to external services.
spec:
  scope:
    agents: ["*"]
    event_types: ["tool_call"]
  rules:
    - id: block-http-tools
      description: Deny tool calls that make HTTP/network requests
      match:
        event_type: tool_call
        payload:
          - field: tool_name
            operator: matches
            value: "^(curl|wget|fetch|http_request|requests_get|requests_post|send_request|api_call).*"
      action: deny
      severity: critical
      message: "Outbound network requests are not permitted"

    - id: block-url-arguments
      description: Deny tool calls with URL-like arguments
      match:
        event_type: tool_call
        payload:
          - field: arguments.url
            operator: matches
            value: "^https?://"
      action: deny
      severity: error
      message: "Tool call contains an outbound URL — potential data exfiltration"
  defaults:
    unmatched_action: allow
    unmatched_severity: info
